<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보처리방침 | Noplan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo"><a href="index.html" class="logo-link">Noplan</a></h1>
      <p class="tagline policy-tagline" id="policy-tagline">개인정보처리방침</p>
      <nav class="lang-switcher" aria-label="Language">
        <a href="privacy-policy.html?lang=ko" class="lang-link" data-lang="ko">한국어</a>
        <span class="lang-sep">|</span>
        <a href="privacy-policy.html?lang=en" class="lang-link" data-lang="en">English</a>
        <span class="lang-sep">|</span>
        <a href="privacy-policy.html?lang=ja" class="lang-link" data-lang="ja">日本語</a>
      </nav>
    </header>

    <main class="main policy-doc">
      <p class="policy-updated" id="policy-updated"></p>
      <div id="policy-content"></div>
    </main>

    <footer class="footer">
      <p><a href="index.html" class="footer-link" id="policy-back-link">← Noplan 개발자 참조로 돌아가기</a></p>
      <p>Noplan AdMob Developer Reference</p>
    </footer>
  </div>
  <script src="policy-content.js"></script>
  <script>
    (function () {
      var LANG_KEY = "policy-lang";
      var LANGS = ["ko", "en", "ja"];

      function getPolicyLang() {
        var params = new URLSearchParams(window.location.search);
        var paramLang = params.get("lang");
        if (paramLang && LANGS.indexOf(paramLang) !== -1) return paramLang;
        try {
          var stored = localStorage.getItem(LANG_KEY);
          if (stored && LANGS.indexOf(stored) !== -1) return stored;
        } catch (e) {}
        var nav = navigator.language || navigator.userLanguage || "";
        if (nav.indexOf("ja") === 0) return "ja";
        if (nav.indexOf("ko") === 0) return "ko";
        return "en";
      }

      function setPolicyLang(lang) {
        try {
          localStorage.setItem(LANG_KEY, lang);
        } catch (e) {}
        var url = new URL(window.location.href);
        url.searchParams.set("lang", lang);
        window.history.replaceState({}, "", url);
      }

      function renderContent(lang) {
        var data = window.POLICY_CONTENT && window.POLICY_CONTENT[lang];
        if (!data) return;

        document.documentElement.lang = lang === "ja" ? "ja" : lang === "en" ? "en" : "ko";
        document.title = data.pageTitle + " | Noplan";

        var tagline = document.getElementById("policy-tagline");
        if (tagline) tagline.textContent = data.pageTitle;

        var updated = document.getElementById("policy-updated");
        if (updated && data.lastUpdatedLabel !== undefined) {
          updated.innerHTML = "<strong>" + data.lastUpdatedLabel + ":</strong> " + data.lastUpdated;
        }

        var backLink = document.getElementById("policy-back-link");
        if (backLink) backLink.textContent = data.backLink;

        var container = document.getElementById("policy-content");
        if (!container) return;
        container.innerHTML = "";

        data.sections.forEach(function (section) {
          var sectionEl = document.createElement("section");
          sectionEl.className = "card intro";
          var h2 = document.createElement("h2");
          h2.textContent = section.title;
          sectionEl.appendChild(h2);

          section.content.forEach(function (block) {
            if (block.type === "p") {
              var p = document.createElement("p");
              p.className = "intro-text";
              p.innerHTML = block.text;
              sectionEl.appendChild(p);
            } else if (block.type === "ul") {
              var ul = document.createElement("ul");
              ul.className = "policy-list";
              block.items.forEach(function (item) {
                var li = document.createElement("li");
                li.innerHTML = item;
                ul.appendChild(li);
              });
              sectionEl.appendChild(ul);
            } else if (block.type === "table") {
              var wrap = document.createElement("div");
              wrap.className = "policy-table-wrap";
              var table = document.createElement("table");
              table.className = "policy-table";
              var thead = document.createElement("thead");
              var trHead = document.createElement("tr");
              block.headers.forEach(function (h) {
                var th = document.createElement("th");
                th.textContent = h;
                trHead.appendChild(th);
              });
              thead.appendChild(trHead);
              table.appendChild(thead);
              var tbody = document.createElement("tbody");
              block.rows.forEach(function (row) {
                var tr = document.createElement("tr");
                row.forEach(function (cell) {
                  var td = document.createElement("td");
                  td.textContent = cell;
                  tr.appendChild(td);
                });
                tbody.appendChild(tr);
              });
              table.appendChild(tbody);
              wrap.appendChild(table);
              sectionEl.appendChild(wrap);
            }
          });
          container.appendChild(sectionEl);
        });
      }

      function setActiveLangLink(lang) {
        document.querySelectorAll(".lang-link").forEach(function (a) {
          a.classList.toggle("active", a.getAttribute("data-lang") === lang);
        });
      }

      function init() {
        var lang = getPolicyLang();
        setPolicyLang(lang);
        setActiveLangLink(lang);
        renderContent(lang);

        document.querySelectorAll(".lang-link").forEach(function (a) {
          a.addEventListener("click", function (e) {
            e.preventDefault();
            var l = a.getAttribute("data-lang");
            setPolicyLang(l);
            setActiveLangLink(l);
            renderContent(l);
          });
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
